<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QueryCraft – Dashboard</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-logo"><div class="sb-logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/><polyline points="9 8 10 9 12 7"/></svg></div><div class="sb-logo-txt">Query<span>Craft</span></div></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user">
      <div class="sb-user-row"><div class="avatar" id="sb-avatar"></div><div style="flex:1;overflow:hidden"><div class="sb-uname" id="sb-uname"></div><div class="sb-urole" id="sb-urole"></div></div></div>
      <button class="signout-btn" onclick="clearAuth();location.href='/login'"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sign Out</button>
    </div>
  </aside>
  <main class="main" id="main">
    <div id="dash-content"></div>
  </main>
</div>
<script src="/js/vendor/lucide.min.js"></script>
<script src="/js/shared.js"></script>
<script>
if (!requireAuth()) throw 0;
const user = getUser();
renderSidebar('dashboard');
if(typeof lucide!=="undefined")lucide.createIcons();

async function load() {
  const main = document.getElementById('dash-content');
  const role = user.role;

  if (role === 'admin') { await loadAdminDash(main); return; }

  // Creator & Respondent share similar layout
  main.innerHTML = `
    <div class="dash-hd"><h1>System Pulse</h1><p id="track-txt">Loading…</p></div>
    <div class="stats-row">
      <div class="stat-card s0"><div class="stat-ico" style="background:#f1f5f9">${icon("minus-circle","var(--txt-3)",20)}</div><div class="stat-label">Not Started</div><div class="stat-val" id="s0">0</div></div>
      <div class="stat-card s1"><div class="stat-ico" style="background:#fff1f1">${icon("alert-circle","var(--accent)",20)}</div><div class="stat-label">Attention</div><div class="stat-val" id="s1">0</div></div>
      <div class="stat-card s2"><div class="stat-ico" style="background:#e8f1ff">${icon("loader","var(--primary)",20)}</div><div class="stat-label">In Progress</div><div class="stat-val" id="s2">0</div></div>
      <div class="stat-card s3"><div class="stat-ico" style="background:#fffbeb">${icon("clock","var(--warning)",20)}</div><div class="stat-label">Review</div><div class="stat-val" id="s3">0</div></div>
      <div class="stat-card s4">
        <div class="combined-ring" id="cpct">0%<br/><span style="font-size:.6rem;font-weight:400">combined</span></div>
        <div class="stat-ico" style="background:#f0fdf4">${icon("check-circle","var(--success)",20)}</div><div class="stat-label">Completed</div><div class="stat-val" id="s4">0</div>
      </div>
    </div>
    <div class="dash-grid">
      <div class="dash-panel">
        <div class="dash-panel-title">📅 Unified Deadlines</div>
        <div id="dl-list"><div class="empty-state">Loading…</div></div>
      </div>
      <div class="dash-panel">
        <div class="dash-panel-title" style="justify-content:space-between">
          <span>📊 Global Activity</span>
          ${role === 'creator' ? '<a class="audit-link" href="/analytics">View Audit</a>' : ''}
        </div>
        <div id="log-list"><div class="empty-state">Loading…</div></div>
      </div>
    </div>
    <div class="dash-panel mt4">
      <div class="dash-panel-title" style="color:var(--accent)">⚠️ Required Revisions</div>
      <div id="rev-list"><div class="empty-state">Loading…</div></div>
    </div>`;

  // Initialize icons immediately after injecting HTML
  if(typeof lucide!=="undefined")lucide.createIcons();

  try {
    const data = await apiGet('/forms/dashboard-stats');
    const s = data.stats || {};
    const total = (+s.not_started||0)+(+s.attention||0)+(+s.in_progress||0)+(+s.review||0)+(+s.completed||0);
    const pct   = total ? Math.round(((+s.completed||0)/total)*100) : 0;
    document.getElementById('track-txt').textContent = `Tracking ${total} active work item${total!==1?'s':''} for ${user.name}.`;
    ['0','1','2','3','4'].forEach((i,idx)=>{
      const keys=['not_started','attention','in_progress','review','completed'];
      document.getElementById(`s${i}`).textContent = s[keys[idx]]||0;
    });
    document.getElementById('cpct').innerHTML=`${pct}%<br/><span style="font-size:.6rem;font-weight:400">combined</span>`;

    const dlEl=document.getElementById('dl-list');
    const tgt = role==='creator' ? '/questionnaire' : '/questionnaire';
    dlEl.innerHTML = data.deadlines?.length ? data.deadlines.map(d=>`
      <div class="dl-item" onclick="location.href='${tgt}'" style="cursor:pointer">
        <div class="dl-dot ${isOverdue(d.due_date)?'over':''}"></div>
        <div class="dl-info"><div class="dl-title">${escHtml(d.title)}</div><div class="dl-meta">Due ${fmtDate(d.due_date)}</div></div>
        <span class="badge ${isOverdue(d.due_date)?'badge-ov':'badge-up'}">${isOverdue(d.due_date)?'Overdue':'Upcoming'}</span>
      </div>`).join('') : '<div class="empty-state">Zero pending deadlines. Excellent!</div>';

    const logEl=document.getElementById('log-list');
    logEl.innerHTML = data.logs?.length ? data.logs.map(l=>`
      <div class="log-row"><div class="log-dot"></div>
        <div><div class="log-txt"><strong>${escHtml(l.user_name)}</strong> — ${escHtml(l.action)}${l.form_title?` · <em>${escHtml(l.form_title)}</em>`:''}</div>
        <div class="log-time">${timeAgo(l.created_at)}</div></div>
      </div>`).join('') : '<div class="empty-state">No recent logs found</div>';

    const revEl=document.getElementById('rev-list');
    if (role === 'creator') {
      if(data.revisions && data.revisions.length > 0){
        revEl.innerHTML = data.revisions.map(r=>`
          <div class="rev-item" onclick="location.href='/review?formId=${r.id}&respId=${r.response_id}'" style="cursor:pointer">
            <div style="display:flex;align-items:center;gap:10px;flex:1">
              <div style="width:8px;height:8px;border-radius:50%;background:var(--warning);flex-shrink:0"></div>
              <div style="flex:1">
                <div class="rev-title">${escHtml(r.title)}</div>
                <div class="rev-sub">Sent back to: ${escHtml(r.user_name)} — waiting for resubmission</div>
              </div>
            </div>
            <button class="btn btn-sm btn-secondary" onclick="event.stopPropagation();location.href='/review?formId=${r.id}&respId=${r.response_id}'">Review</button>
          </div>`).join('');
      } else {
        revEl.innerHTML = '<div class="empty-state">No responses have been sent back for revision.</div>';
      }
    } else {
      if(data.revisions && data.revisions.length > 0){
        revEl.innerHTML = data.revisions.map(r=>`
          <div class="rev-item" onclick="location.href='/fill-form?id=${r.id}'" style="cursor:pointer">
            <div style="display:flex;align-items:center;gap:10px;flex:1">
              <div style="width:8px;height:8px;border-radius:50%;background:var(--danger);flex-shrink:0;animation:pulse 1.5s infinite"></div>
              <div style="flex:1">
                <div class="rev-title">${escHtml(r.title)}</div>
                <div class="rev-sub" style="color:var(--danger)">Action Required — Your response was sent back. Please update and resubmit.</div>
              </div>
            </div>
            <button class="btn btn-sm btn-primary" onclick="event.stopPropagation();location.href='/fill-form?id=${r.id}'">Update Now</button>
          </div>`).join('');
      } else {
        revEl.innerHTML = '<div class="empty-state">No corrections required at this time.</div>';
      }
    }
  } catch(err) { toast(err.message, 'err'); }
}

// ── Admin Dashboard ───────────────────────────────────────────────────────────
async function loadAdminDash(main) {
  main.innerHTML = `
    <div class="dash-hd"><h1>Admin Overview</h1><p>System-wide monitoring across all creators and respondents.</p></div>
    <div id="admin-stats"><div class="spinner-wrap"><div class="spinner"></div></div></div>`;
  try {
    const data = await apiGet('/forms/dashboard-stats');
    const s    = data.stats || {};
    document.getElementById('admin-stats').innerHTML = `
      <div class="stats-row" style="grid-template-columns:repeat(4,1fr)">
        <div class="stat-card s2"><div class="stat-ico" style="background:#e8f1ff">${icon("edit-3","var(--primary)",20)}</div><div class="stat-label">Creators</div><div class="stat-val">${s.total_creators||0}</div></div>
        <div class="stat-card s4"><div class="stat-ico" style="background:#f0fdf4">${icon("user-check","var(--success)",20)}</div><div class="stat-label">Respondents</div><div class="stat-val">${s.total_respondents||0}</div></div>
        <div class="stat-card s3"><div class="stat-ico" style="background:#fffbeb">${icon("file-text","var(--warning)",20)}</div><div class="stat-label">Total Forms</div><div class="stat-val">${s.total_forms||0}</div></div>
        <div class="stat-card s0"><div class="stat-ico" style="background:#f1f5f9">${icon("bar-chart-2","var(--txt-2)",20)}</div><div class="stat-label">Responses</div><div class="stat-val">${s.total_responses||0}</div></div>
      </div>
      <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-bottom:20px">
        <div class="stat-card s4"><div class="stat-ico" style="background:#f0fdf4">${icon("check-circle","var(--success)",20)}</div><div class="stat-label">Completed</div><div class="stat-val" style="color:var(--success)">${s.completed||0}</div></div>
        <div class="stat-card s3"><div class="stat-ico" style="background:#fffbeb">${icon("clock","var(--warning)",20)}</div><div class="stat-label">In Review</div><div class="stat-val" style="color:var(--warning)">${s.in_review||0}</div></div>
        <div class="stat-card s1"><div class="stat-ico" style="background:#fff1f1">${icon("alert-circle","var(--accent)",20)}</div><div class="stat-label">Attention</div><div class="stat-val" style="color:var(--accent)">${s.attention||0}</div></div>
      </div>
      <div class="dash-grid">
        <div class="dash-panel">
          <div class="dash-panel-title" style="justify-content:space-between">
            📊 Recent Activity
            <a class="audit-link" href="/admin">Full Admin Panel →</a>
          </div>
          ${data.recentActivity?.length ? data.recentActivity.map(l=>`
            <div class="log-row"><div class="log-dot"></div>
              <div><div class="log-txt"><strong>${escHtml(l.user_name)}</strong> — ${escHtml(l.action)}${l.form_title?` · <em>${escHtml(l.form_title)}</em>`:''}</div>
              <div class="log-time">${timeAgo(l.created_at)}</div></div>
            </div>`).join('') : '<div class="empty-state">No activity yet</div>'}
        </div>
        <div class="dash-panel">
          <div class="dash-panel-title">📋 Top Forms</div>
          ${data.topForms?.length ? data.topForms.map(f=>`
            <div class="dl-item" onclick="location.href='/admin'" style="cursor:pointer">
              <div class="dl-dot"></div>
              <div class="dl-info">
                <div class="dl-title">${escHtml(f.title)}</div>
                <div class="dl-meta">By ${escHtml(f.creator_name)} · ${f.responses||0} responses</div>
              </div>
            </div>`).join('') : '<div class="empty-state">No forms yet</div>'}
        </div>
      </div>
      <div style="text-align:center;margin-top:20px">
        <button class="btn btn-primary btn-lg" onclick="location.href='/admin'">🛡️ Open Full Admin Panel</button>
      </div>`;
  } catch(err) { toast(err.message,'err'); }
  if(typeof lucide!=="undefined")lucide.createIcons();
}

load();
</script>
</body></html>
