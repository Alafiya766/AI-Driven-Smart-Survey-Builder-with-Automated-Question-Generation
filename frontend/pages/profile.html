<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QueryCraft – Profile</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-logo"><div class="sb-logo-icon"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/><line x1="9" y1="12" x2="15" y2="12"/><line x1="9" y1="16" x2="15" y2="16"/><polyline points="9 8 10 9 12 7"/></svg></div><div class="sb-logo-txt">Query<span>Craft</span></div></div>
    <nav class="sb-nav" id="sb-nav"></nav>
    <div class="sb-user">
      <div class="sb-user-row"><div class="avatar" id="sb-avatar"></div><div style="flex:1;overflow:hidden"><div class="sb-uname" id="sb-uname"></div><div class="sb-urole" id="sb-urole"></div></div></div>
      <button class="signout-btn" onclick="clearAuth();location.href='/login'"><svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg> Sign Out</button>
    </div>
  </aside>
  <main class="main">
    <div class="ph"><div class="ph-title">Profile</div></div>
    <div id="content"><div class="spinner-wrap"><div class="spinner"></div></div></div>
  </main>
</div>
<script src="/js/vendor/lucide.min.js"></script>
<script src="/js/shared.js"></script>
<script>
if (!requireAuth()) throw 0;
renderSidebar('profile');
async function load() {
  try {
    const me = await apiGet('/auth/me');
    renderProfile(me);
  } catch(err) {
    // Fallback: use cached user from localStorage
    const cached = getUser();
    if (cached && cached.name) {
      renderProfile(cached);
    } else {
      document.getElementById('content').innerHTML = '<div class="empty-state">Failed to load profile. Please sign in again.</div>';
    }
  }
}
function renderProfile(me) {
    const roleDescriptions = {
      admin:      '🛡️ You monitor all creators, respondents, forms, and system activity.',
      creator:    '✏️ You build questionnaires, use AI Assist, assign respondents and review submissions.',
      respondent: '📝 You fill and submit questionnaires assigned to you by creators.'
    };
    document.getElementById('content').innerHTML = `
      <div class="card" style="max-width:520px">
        <div style="display:flex;align-items:center;gap:20px;margin-bottom:26px">
          <div class="profile-avatar">${me.name.charAt(0).toUpperCase()}</div>
          <div>
            <div style="font-size:1.25rem;font-weight:800">${escHtml(me.name)}</div>
            <div style="font-size:.86rem;color:var(--txt-2)">${escHtml(me.email)}</div>
            <div style="margin-top:7px;font-size:.82rem;font-weight:700;color:${roleColor(me.role)}">${roleBadge(me.role)}</div>
          </div>
        </div>
        <div style="background:var(--bg);border-radius:var(--rs);padding:12px 14px;margin-bottom:20px;font-size:.84rem;color:var(--txt-2)">
          ${escHtml(roleDescriptions[me.role] || '')}
        </div>
        <div class="info-row"><div class="info-label">Name</div><div class="info-val">${escHtml(me.name)}</div></div>
        <div class="info-row"><div class="info-label">Email</div><div class="info-val">${escHtml(me.email)}</div></div>
        <div class="info-row"><div class="info-label">Role</div><div class="info-val">${roleBadge(me.role)}</div></div>
        <div class="info-row" style="margin-bottom:22px"><div class="info-label">Member Since</div><div class="info-val">${fmtDate(me.created_at)}</div></div>
        <button class="btn btn-danger btn-sm" onclick="clearAuth();location.href='/login'">${icon("log-out","currentColor",18)} Sign Out</button>
      </div>`;
    }
load();
</script>
</body></html>
