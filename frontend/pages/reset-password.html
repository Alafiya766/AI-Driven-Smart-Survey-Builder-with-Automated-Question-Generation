<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QueryCraft – Reset Password</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">Q</div>
        <div class="auth-logo-text">Query<span>Craft</span></div>
      </div>
      <div class="auth-heading">Set new password</div>
      <div class="auth-sub">Enter your new password below.</div>
      <div class="auth-error"   id="err"></div>
      <div class="auth-success" id="ok"></div>
      <div id="formArea">
        <div class="fld"><label>New Password</label>
          <input type="password" id="pass" placeholder="Min 6 characters" required minlength="6"/></div>
        <div class="fld"><label>Confirm Password</label>
          <input type="password" id="pass2" placeholder="Repeat new password" required minlength="6"/></div>
        <button class="auth-btn" id="sbtn" onclick="handleReset()">Reset Password →</button>
      </div>
      <div class="auth-switch"><a href="/login">← Back to Sign In</a></div>
    </div>
  </div>
</div>
<script src="/js/vendor/lucide.min.js"></script>
<script src="/js/shared.js"></script>
<script>
const token = new URLSearchParams(location.search).get('token');
if (!token) {
  document.getElementById('err').textContent = 'Invalid reset link. Please request a new one.';
  document.getElementById('err').style.display = 'block';
  document.getElementById('formArea').style.display = 'none';
}

async function handleReset() {
  const errEl = document.getElementById('err');
  const okEl  = document.getElementById('ok');
  const btn   = document.getElementById('sbtn');
  const pass  = document.getElementById('pass').value;
  const pass2 = document.getElementById('pass2').value;
  errEl.style.display = 'none'; okEl.style.display = 'none';
  if (pass !== pass2) { errEl.textContent = 'Passwords do not match'; errEl.style.display = 'block'; return; }
  btn.textContent = 'Resetting…'; btn.disabled = true;
  try {
    const data = await apiPost('/auth/reset-password', { token, password: pass });
    okEl.textContent = '✅ ' + data.message;
    okEl.style.display = 'block';
    document.getElementById('formArea').style.display = 'none';
    setTimeout(() => location.href = '/login', 2000);
  } catch(err) { errEl.textContent = err.message; errEl.style.display = 'block'; }
  finally { btn.textContent = 'Reset Password →'; btn.disabled = false; }
}
</script>
</body></html>
