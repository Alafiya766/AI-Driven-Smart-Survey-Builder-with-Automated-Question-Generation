<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>QueryCraft – Forgot Password</title>
<link rel="stylesheet" href="/css/style.css"/>
</head>
<body>
<div class="auth-page">
  <div class="auth-wrap">
    <div class="auth-card">
      <div class="auth-logo">
        <div class="auth-logo-icon">Q</div>
        <div class="auth-logo-text">Query<span>Craft</span></div>
      </div>
      <div class="icon-wrap"><div class="icon">🔒</div></div>
      <div class="auth-heading">Forgot your password?</div>
      <div class="auth-sub">Enter your email and we'll send you a reset link.</div>
      <div class="auth-error"   id="err"></div>
      <div class="auth-success" id="ok">
        ✅ If that email is registered, a reset link has been sent. Please check your inbox (and spam folder).
      </div>
      <div id="formArea">
        <div class="fld"><label>Email Address</label>
          <input type="email" id="email" placeholder="you@example.com" required autocomplete="email"/></div>
        <button class="auth-btn" id="sbtn" onclick="handleForgot()">Send Reset Link →</button>
      </div>
      <div class="auth-switch"><a href="/login">← Back to Sign In</a></div>
    </div>
  </div>
</div>
<script src="/js/vendor/lucide.min.js"></script>
<script src="/js/shared.js"></script>
<script>
async function handleForgot() {
  const errEl = document.getElementById('err');
  const okEl  = document.getElementById('ok');
  const btn   = document.getElementById('sbtn');
  errEl.style.display = 'none'; okEl.style.display = 'none';
  btn.textContent = 'Sending…'; btn.disabled = true;
  try {
    await apiPost('/auth/forgot-password', { email: document.getElementById('email').value.trim() });
    okEl.style.display = 'block';
    document.getElementById('formArea').style.display = 'none';
  } catch(err) { errEl.textContent = err.message; errEl.style.display = 'block'; }
  finally { btn.textContent = 'Send Reset Link →'; btn.disabled = false; }
}
</script>
</body></html>
